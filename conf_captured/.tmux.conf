# send buffer contents to neovim for copy paste.
bind-key b new-window 'tmux capture-pane -S - -p -t ! | ~/bin/nvim/nvim-linux-x86_64/bin/nvim -c "set nonumber laststatus=0 noshowmode cmdheight=0" -R -'

