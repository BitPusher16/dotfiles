#bind-key F5 run-shell "#{pane_current_path}/start_debugger.sh"
#bind-key b run-shell "#{pane_current_path}/start_debugger.sh"
#bind-key b run-shell "~/.scripts/tmux/start_debugger.sh"
#bind-key b run-shell "~/.scripts/start_debugger.sh"

# i'm going to give these to tmux rather than neovim.
# i'll work out some other way to navigate neovim windows... maybe ctrl-w hjkl?
#bind-key -n C-j select-pane -D
#bind-key -n C-k select-pane -U
#bind-key -n C-h select-pane -L
#bind-key -n C-l select-pane -R

bind-key -n C-h if -F "#{pane_at_left}" "" "select-pane -L"
bind-key -n C-l if -F "#{pane_at_right}" "" "select-pane -R"
bind-key -n C-k if -F "#{pane_at_top}" "" "select-pane -U"
bind-key -n C-j if -F "#{pane_at_bottom}" "" "select-pane -D"


# rebind % and " so that they open new splits in the current dir.
#bind-key % split-window -h -c "#{pane_current_path}"
#bind-key '"' split-window -v -c "#{pane_current_path}"

# these are available in tmux. let's use pattern from neovim and add flag to open in same dir.
# NOTE: horizontal and vertical split mean the opposite of what they mean in neovim, so swap them.
bind-key h split-window -v -c "#{pane_current_path}"
bind-key v split-window -h -c "#{pane_current_path}"

# shortcut to respawn a pane (for example, to reload .bashrc or .tmux.conf)
# repurpose r, which is refresh-client.
# TODO: just reload both .bashrc and .tmux.conf? no need to respawn.
# TODO: restart whole shell, all of tmux? no, i may want some panes to persist.
# reload configs (source tmux conf, restart tmux pane.)
#unbind-key r
bind-key R source-file ~/.tmux.conf\; respawn-pane -k\;

# run debugger (open new debugger pane, or switch to it, and run ./.debug.sh, if it exists)
bind-key e run-shell "bash ~/.scripts/debugger.sh"
